<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi primera web en GitHub Pages</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#f4f4f4;
        }

        .hero{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            text-align:center;
        }

        .card-custom{
            border:none;
            border-radius:15px;
            transition:0.3s;
        }

        .card-custom:hover{
            transform:scale(1.03);
        }
    </style>
</head>
<body>

    <section class="hero container">
        <h1 class="display-3 fw-bold text-primary">
            🚀 Mi web publicada con GitHub Pages
        </h1>

        <p class="lead mt-3">
            Si estás viendo esto online... ¡lo has conseguido!
        </p>

        <a href="https://github.com" class="btn btn-dark btn-lg mt-3">
            Ir a GitHub
        </a>

        <div class="row mt-5 w-100">

            <div class="col-md-4 mb-4">
                <div class="card shadow card-custom p-4">
                    <h3>HTML</h3>
                    <p>Estructura de la web.</p>
                </div>
            </div>

            <div class="col-md-4 mb-4">
                <div class="card shadow card-custom p-4">
                    <h3>CSS</h3>
                    <p>Diseño y estilos visuales.</p>
                </div>
            </div>

            <div class="col-md-4 mb-4">
                <div class="card shadow card-custom p-4">
                    <h3>Bootstrap</h3>
                    <p>Componentes rápidos y responsive.</p>
                </div>
            </div>

        </div>
    </section>

</body>
</html>
